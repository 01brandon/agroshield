<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>login - agroshield</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-card">
  <a href="/" class="auth-logo">agro<span>shield</span></a>
  <h2>welcome back</h2>
  <p>sign in to your account</p>

  <form id="loginForm">
    <div class="form-group">
      <label>email address</label>
      <input type="email" id="loginEmail" placeholder="farmer@example.com" required>
    </div>
    <div class="form-group">
      <label>password</label>
      <input type="password" id="loginPassword" placeholder="your password" required>
    </div>
    <p class="form-error" id="loginError"></p>
    <button type="submit" class="btn-primary btn-full">sign in</button>
  </form>

  <div class="auth-divider"><span>or</span></div>
  <a href="https://accounts.google.com/o/oauth2/v2/auth" class="btn-google" id="googleLogin">
    continue with google
  </a>

  <p class="auth-switch">
    dont have an account? <a href="/register">create one here</a>
  </p>
</div>
<script src="{% static 'js/auth.js' %}"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const error    = document.getElementById('loginError');

    try {
      const res  = await fetch('/api/auth/login/', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({email, password}),
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('access',  data.access);
        localStorage.setItem('refresh', data.refresh);
        window.location.href = '/dashboard/';
      } else {
        error.textContent = data.detail || 'invalid email or password';
      }
    } catch (err) {
      error.textContent = 'connection error. please try again.';
    }
  });
</script>
</body>
</html>
