<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>login - agroshield</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-card">
  <a href="/" class="auth-logo">agro<span>shield</span></a>
  <h2>welcome back</h2>
  <p>sign in to your account</p>

  <form id="loginForm">
    <div class="form-group">
      <label>email address</label>
      <input type="email" id="loginEmail" placeholder="farmer@example.com" required>
    </div>
    <div class="form-group">
      <label>password</label>
      <input type="password" id="loginPassword" placeholder="your password" required>
    </div>
    <p class="form-error" id="loginError"></p>
    <button type="submit" class="btn-primary btn-full">sign in</button>
  </form>

  <div class="auth-divider"><span>or</span></div>

  <a href="/accounts/google/login/" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;vertical-align:middle" fill="none">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    continue with google
  </a>

  <p class="auth-switch">dont have an account? <a href="/register">create one here</a></p>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const error    = document.getElementById('loginError');
    error.textContent = '';

    try {
      const res  = await fetch('/api/auth/login/', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({email, password}),
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('access',  data.access);
        localStorage.setItem('refresh', data.refresh);
        window.location.href = '/dashboard/';
      } else {
        error.textContent = data.detail || 'invalid email or password. check your credentials and try again.';
      }
    } catch (err) {
      error.textContent = 'connection error. please try again.';
    }
  });
</script>
</body>
</html>
