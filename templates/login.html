<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>login - agroshield</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-card">
  <a href="/" class="auth-logo">agro<span>shield</span></a>
  <h2>welcome back</h2>
  <p>sign in to your account</p>
  <form id="loginForm">
    <div class="form-group">
      <label>email address</label>
      <input type="email" id="loginEmail" placeholder="farmer@example.com" required>
    </div>
    <div class="form-group">
      <label>password</label>
      <input type="password" id="loginPassword" placeholder="your password" required>
    </div>
    <p class="form-error" id="loginError"></p>
    <button type="submit" class="btn-primary btn-full" id="loginBtn">sign in</button>
  </form>
  <p class="auth-switch">dont have an account? <a href="/register">create one here</a></p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const error    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');
  error.textContent = '';
  btn.disabled = true; btn.textContent = 'signing in...';
  try {
    const res  = await fetch('/api/auth/login/', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('access',  data.access);
      localStorage.setItem('refresh', data.refresh);
      window.location.href = '/dashboard/';
    } else {
      error.textContent = data.detail || 'invalid email or password';
      btn.disabled = false; btn.textContent = 'sign in';
    }
  } catch {
    error.textContent = 'connection error. please try again.';
    btn.disabled = false; btn.textContent = 'sign in';
  }
});
</script>
</body>
</html>
